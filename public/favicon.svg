<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Isometric cube favicon for Tecleados -->
  <!-- Left face (Digital - Cyan) -->
  <polygon points="16,8 4,15 16,22 16,8" fill="#00d4e6" opacity="0.9"/>
  <!-- Right face (Human - Warm) -->
  <polygon points="16,8 28,15 16,22 16,8" fill="#e07316" opacity="0.9"/>
  <!-- Top face (Natural - Green) -->
  <polygon points="16,8 4,15 16,22 28,15" fill="#3d8a35" opacity="0.9"/>
  <!-- Keycap on top -->
  <rect x="12" y="2" width="8" height="8" rx="1" fill="#faf8f3" opacity="0.95"/>
  <rect x="13" y="3" width="6" height="6" rx="0.5" fill="#e0d8c8"/>
</svg>
